# Preserve an inbound X-Forwarded-Proto (set by an upstream TLS proxy like Caddy);
# fall back to the connection scheme when there is no front proxy.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Django API, admin, static, media -> backend (gunicorn)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # User-uploaded media is self-hosted on the shared `media` volume and served
    # directly by nginx — Django does not serve /media/ when DEBUG is off.
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # SEO endpoints generated by Django (need absolute URLs / live catalog).
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location = /robots.txt {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Single-page app fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
